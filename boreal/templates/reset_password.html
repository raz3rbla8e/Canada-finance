<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#2a5a3f">
<title>Reset password — Boreal</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none'%3E%3Crect width='24' height='24' rx='6' fill='%232a5a3f'/%3E%3Cpath d='M12 3 L7 10 L9.5 10 L6.5 14 L9 14 L5 19 L19 19 L15 14 L17.5 14 L14.5 10 L17 10 Z' fill='white' opacity='0.95'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg-app:oklch(13% 0.015 240);--bg-surface:oklch(17% 0.02 240);--line-1:oklch(24% 0.022 240);--line-2:oklch(28% 0.025 240);--ink-1:oklch(96% 0.005 95);--ink-2:oklch(80% 0.01 240);--ink-3:oklch(68% 0.012 240);--ink-4:oklch(48% 0.012 240);--accent:oklch(72% 0.13 165);--accent-soft:oklch(26% 0.05 165);--accent-ink:oklch(85% 0.13 165);--accent-fg:oklch(15% 0.02 165);--font-sans:"Inter Tight","Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--r-2:10px;--r-3:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--bg-app);color:var(--ink-1);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center}
.auth-wrap{width:100%;max-width:380px;padding:24px}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;justify-content:center}
.auth-logo svg{width:32px;height:32px;color:var(--accent)}
.auth-logo-text{font-size:20px;font-weight:600;letter-spacing:-0.02em}
.auth-card{background:var(--bg-surface);border:1px solid var(--line-1);border-radius:var(--r-3);padding:28px 24px}
.auth-card h2{font-size:18px;font-weight:600;margin-bottom:4px;letter-spacing:-0.01em}
.auth-card .subtitle{color:var(--ink-3);font-size:13px;margin-bottom:20px}
.auth-field{margin-bottom:14px}
.auth-field label{display:block;font-size:12px;font-weight:500;color:var(--ink-2);margin-bottom:5px}
.auth-field input{width:100%;padding:9px 12px;border:1px solid var(--line-2);border-radius:var(--r-2);background:var(--bg-app);color:var(--ink-1);font-family:var(--font-sans);font-size:14px;outline:none;transition:border-color 0.15s}
.auth-field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.auth-field input::placeholder{color:var(--ink-4)}
.auth-btn{width:100%;padding:10px 16px;border:none;border-radius:var(--r-2);background:var(--accent);color:var(--accent-fg);font-family:var(--font-sans);font-size:14px;font-weight:600;cursor:pointer;transition:background 0.15s;margin-top:6px}
.auth-btn:hover{background:var(--accent-ink)}
.auth-error{background:oklch(28% 0.07 28);border:1px solid oklch(40% 0.12 28);color:oklch(85% 0.06 28);padding:8px 12px;border-radius:8px;font-size:13px;margin-bottom:14px}
.auth-hint{color:var(--ink-4);font-size:11px;margin-top:4px}
.auth-links{text-align:center;margin-top:16px;font-size:13px;color:var(--ink-3)}
.auth-links a{color:var(--accent);text-decoration:none}
.auth-links a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-logo">
    <svg viewBox="0 0 512 512" fill="none">
      <polygon points="256,80 196,180 316,180" fill="currentColor"/>
      <polygon points="256,140 176,260 336,260" fill="currentColor"/>
      <polygon points="256,210 156,340 356,340" fill="currentColor"/>
      <rect x="240" y="340" width="32" height="52" rx="4" fill="currentColor" opacity="0.7"/>
    </svg>
    <span class="auth-logo-text">Boreal</span>
  </div>

  <div class="auth-card">
    <h2>Set a new password</h2>
    <p class="subtitle">Choose a strong password for your account</p>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="auth-field">
        <label for="password">New password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autofocus autocomplete="new-password" minlength="8">
        <div class="auth-hint">At least 8 characters</div>
      </div>
      <div class="auth-field">
        <label for="confirm_password">Confirm password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required autocomplete="new-password" minlength="8">
      </div>
      <button type="submit" class="auth-btn">Reset password</button>
    </form>

    <div class="auth-links">
      <a href="{{ url_for('auth.login') }}">Back to login</a>
    </div>
  </div>
</div>
</body>
</html>
