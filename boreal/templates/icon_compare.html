<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Boreal Icon Comparison</title>
<style>
  body { background: #0f1218; color: #e8e8ec; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; gap: 40px; }
  h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 32px; max-width: 900px; }
  .option { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .option h2 { font-size: 14px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 1px; }
  .sizes { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .sizes span { font-size: 10px; color: #555; font-family: monospace; }
  img { border-radius: 12px; }
  .preview { display: flex; align-items: center; gap: 10px; background: #1a1d24; border: 1px solid #2a2d34; border-radius: 10px; padding: 12px 16px; margin-top: 8px; }
  .preview img { border-radius: 6px; }
  .preview span { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; }
</style>
</head>
<body>
  <h1>Boreal — Icon Concepts</h1>
  <div class="grid">
    <div class="option">
      <h2>Evergreen</h2>
      <div class="sizes">
        <img src="/static/icons/icon-evergreen.svg" width="128" height="128" alt="Evergreen 128px">
        <span>128px</span>
        <img src="/static/icons/icon-evergreen.svg" width="48" height="48" alt="Evergreen 48px">
        <span>48px</span>
        <img src="/static/icons/icon-evergreen.svg" width="16" height="16" alt="Evergreen 16px">
        <span>16px (favicon)</span>
      </div>
      <div class="preview">
        <img src="/static/icons/icon-evergreen.svg" width="32" height="32">
        <span>Boreal</span>
      </div>
    </div>
    <div class="option">
      <h2>North Star</h2>
      <div class="sizes">
        <img src="/static/icons/icon-star.svg" width="128" height="128" alt="Star 128px">
        <span>128px</span>
        <img src="/static/icons/icon-star.svg" width="48" height="48" alt="Star 48px">
        <span>48px</span>
        <img src="/static/icons/icon-star.svg" width="16" height="16" alt="Star 16px">
        <span>16px (favicon)</span>
      </div>
      <div class="preview">
        <img src="/static/icons/icon-star.svg" width="32" height="32">
        <span>Boreal</span>
      </div>
    </div>
    <div class="option">
      <h2>Mountain</h2>
      <div class="sizes">
        <img src="/static/icons/icon-mountain.svg" width="128" height="128" alt="Mountain 128px">
        <span>128px</span>
        <img src="/static/icons/icon-mountain.svg" width="48" height="48" alt="Mountain 48px">
        <span>48px</span>
        <img src="/static/icons/icon-mountain.svg" width="16" height="16" alt="Mountain 16px">
        <span>16px (favicon)</span>
      </div>
      <div class="preview">
        <img src="/static/icons/icon-mountain.svg" width="32" height="32">
        <span>Boreal</span>
      </div>
    </div>
    <div class="option">
      <h2>B Lettermark</h2>
      <div class="sizes">
        <img src="/static/icons/icon-lettermark.svg" width="128" height="128" alt="Lettermark 128px">
        <span>128px</span>
        <img src="/static/icons/icon-lettermark.svg" width="48" height="48" alt="Lettermark 48px">
        <span>48px</span>
        <img src="/static/icons/icon-lettermark.svg" width="16" height="16" alt="Lettermark 16px">
        <span>16px (favicon)</span>
      </div>
      <div class="preview">
        <img src="/static/icons/icon-lettermark.svg" width="32" height="32">
        <span>Boreal</span>
      </div>
    </div>
  </div>
</body>
</html>
