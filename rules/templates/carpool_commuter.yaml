# Carpool / Commuter — label e-transfers from specific people as income
#
# HOW TO USE:
# After loading this template, edit the "Label carpool e-transfers" rule
# and replace the placeholder names with the actual names as they appear
# in your e-transfer descriptions (comma-separated for multiple people).
# You may need to create a "Carpool Income" category first in Settings → Categories.
#
name: "Carpool / Commuter"
description: "Labels Interac e-transfers from specific people as income using contains_any. Edit rule after loading to fill in names."
rules:
  - name: "Label carpool e-transfers"
    action: label
    action_value: '{"type": "Income", "category": "Carpool Income"}'
    conditions:
      - field: description
        operator: contains_any
        value: "PERSON_NAME_1, PERSON_NAME_2"
      - field: description
        operator: contains
        value: "interac"
  - name: "Hide credit card payments"
    action: hide
    conditions:
      - field: description
        operator: contains
        value: "credit card payment"
